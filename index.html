<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rspack Browser Bundling</title>
    <!-- Monaco Editor -->
    <link rel="stylesheet" data-name="vs/editor/editor.main" href="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/editor/editor.main.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 15px 20px;
            text-align: center;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 1.8em;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 280px;
            border-right: 1px solid #e0e0e0;
            overflow-y: auto;
            background: #f8f9fa;
            padding: 10px;
            flex-shrink: 0;
        }

        .sidebar h3 {
            color: #333;
            font-size: 1em;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 2px solid #667eea;
        }

        .file-tree {
            list-style: none;
        }

        .file-tree-item {
            padding: 8px 10px;
            cursor: pointer;
            border-radius: 4px;
            margin-bottom: 2px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .file-tree-item:hover {
            background: #e0e0e0;
        }

        .file-tree-item.active {
            background: #667eea;
            color: white;
        }

        .file-tree-item.folder {
            font-weight: 600;
            color: #764ba2;
        }

        .file-tree-item .icon {
            width: 20px;
            text-align: center;
        }

        .editor-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: white;
        }

        .operation-panel {
            width: 350px;
            border-left: 1px solid #e0e0e0;
            overflow-y: auto;
            background: #fafafa;
            padding: 15px;
            flex-shrink: 0;
        }

        .editor-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 10px;
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            flex-shrink: 0;
        }

        .editor-section h2 {
            color: #333;
            margin: 0;
            font-size: 1em;
        }

        .editor-toolbar {
            display: flex;
            gap: 8px;
        }

        .btn-toolbar {
            padding: 6px 12px;
            font-size: 13px;
            border: 1px solid #667eea;
            border-radius: 4px;
            cursor: pointer;
            background: white;
            color: #667eea;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-toolbar:hover {
            background: #667eea;
            color: white;
        }

        .code-editor {
            flex: 1;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }

        .code-editor:focus-within {
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            width: 100%;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            opacity: 0.9;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(245, 87, 108, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .output-section {
            background: #f8f9fa;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .output-section h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1em;
            font-weight: 600;
        }

        .output-content {
            background: #1e1e1e;
            color: #d4d4d4;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 11px;
            padding: 10px;
            border-radius: 4px;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
        }

        .stat-card {
            background: white;
            padding: 10px 12px;
            border-radius: 4px;
            border-left: 3px solid #667eea;
        }

        .stat-label {
            color: #666;
            font-size: 0.85em;
            margin-bottom: 4px;
        }

        .stat-value {
            color: #333;
            font-size: 1.2em;
            font-weight: 600;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            color: #f5576c;
            background: #ffe0e0;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border-left: 4px solid #f5576c;
        }

        .success {
            color: #00b894;
            background: #d1f2eb;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border-left: 4px solid #00b894;
        }

        .files-list {
            margin: 10px 0;
            background: white;
            border-radius: 4px;
            overflow: hidden;
            max-height: 250px;
            overflow-y: auto;
        }

        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 10px;
            border-bottom: 1px solid #e0e0e0;
            transition: background 0.2s;
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .file-item:hover {
            background: #f8f9fa;
        }

        .file-info {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .file-icon {
            font-size: 16px;
        }

        .file-details {
            flex: 1;
        }

        .file-name {
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 12px;
            color: #333;
            font-weight: 500;
        }

        .file-size {
            font-size: 10px;
            color: #666;
            margin-top: 2px;
        }

        .file-actions {
            display: flex;
            gap: 4px;
        }

        .btn-small {
            padding: 4px 8px;
            font-size: 11px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .btn-download {
            background: #667eea;
            color: white;
        }

        .btn-download:hover {
            background: #5568d3;
            transform: translateY(-1px);
        }

        .btn-view {
            background: #e0e0e0;
            color: #333;
        }

        .btn-view:hover {
            background: #d0d0d0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Rspack Browser Bundling</h1>
            <p>在浏览器中实时打包 JavaScript 代码</p>
        </div>

        <div class="content">
            <!-- 左侧边栏：文件树 -->
            <div class="sidebar">
                <h3>📁 项目文件</h3>
                <ul class="file-tree" id="fileTree"></ul>
            </div>

            <!-- 中间区域：编辑器 -->
            <div class="editor-area">
                <div class="editor-section">
                    <div class="editor-header">
                        <h2 id="editorTitle">💻 代码编辑器</h2>
                        <div class="editor-toolbar">
                            <button class="btn-toolbar" id="saveFileBtn" disabled>💾 保存</button>
                        </div>
                    </div>
                    <div class="code-editor" id="codeEditor"></div>
                </div>
            </div>

            <!-- 右侧操作面板 -->
            <div class="operation-panel">
                <!-- 操作按钮 -->
                <div class="button-group">
                    <button id="bundleBtn" class="btn-primary">
                        🔨 打包代码
                    </button>
                    <button id="runBtn" class="btn-secondary" disabled>
                        ▶️ 运行打包结果
                    </button>
                    <button id="downloadBtn" class="btn-secondary" disabled>
                        💾 下载产物
                    </button>
                </div>

                <!-- 统计信息 -->
                <div class="output-section">
                    <h3>📊 打包统计</h3>
                    <div class="stats" id="stats" style="display: none;">
                        <div class="stat-card">
                            <div class="stat-label">打包时间</div>
                            <div class="stat-value" id="buildTime">-</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">输出大小</div>
                            <div class="stat-value" id="outputSize">-</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">模块数量</div>
                            <div class="stat-value" id="moduleCount">-</div>
                        </div>
                    </div>
                </div>

                <!-- 文件列表 -->
                <div id="filesList" class="files-list" style="display: none;"></div>

                <!-- 打包输出 -->
                <div class="output-section">
                    <h3>📋 打包输出</h3>
                    <div id="output" class="output-content">等待打包...</div>
                    <div id="message"></div>
                </div>

                <!-- 运行输出 -->
                <div class="output-section" id="runOutputSection" style="display: none;">
                    <h3>🖥️ 运行输出</h3>
                    <div id="runOutput" class="output-content"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Monaco Editor Loader -->
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
    <script>
        require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' } });
    </script>
    
    <script type="module" src="/src/main.js"></script>
</body>
</html>
