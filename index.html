<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rspack Browser Demo</title>
    <!-- Service Worker for COOP/COEP headers (required for SharedArrayBuffer on GitHub Pages) -->
    <script src="./coi-serviceworker.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .editor-section {
            margin-bottom: 30px;
        }

        .editor-section h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.5em;
        }

        .code-editor {
            width: 100%;
            min-height: 200px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 14px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            background: #f8f9fa;
            resize: vertical;
            line-height: 1.5;
        }

        .code-editor:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin: 20px 0;
        }

        button {
            flex: 1;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(245, 87, 108, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .output-section {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
        }

        .output-section h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .output-content {
            background: #1e1e1e;
            color: #d4d4d4;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 13px;
            padding: 15px;
            border-radius: 6px;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .stat-label {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .stat-value {
            color: #333;
            font-size: 1.5em;
            font-weight: bold;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            color: #f5576c;
            background: #ffe0e0;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border-left: 4px solid #f5576c;
        }

        .success {
            color: #00b894;
            background: #d1f2eb;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border-left: 4px solid #00b894;
        }

        .files-list {
            margin: 20px 0;
            background: white;
            border-radius: 8px;
            overflow: hidden;
        }

        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 15px;
            border-bottom: 1px solid #e0e0e0;
            transition: background 0.2s;
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .file-item:hover {
            background: #f8f9fa;
        }

        .file-info {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .file-icon {
            font-size: 20px;
        }

        .file-details {
            flex: 1;
        }

        .file-name {
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 14px;
            color: #333;
            font-weight: 500;
        }

        .file-size {
            font-size: 12px;
            color: #666;
            margin-top: 2px;
        }

        .file-actions {
            display: flex;
            gap: 8px;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .btn-download {
            background: #667eea;
            color: white;
        }

        .btn-download:hover {
            background: #5568d3;
            transform: translateY(-1px);
        }

        .btn-view {
            background: #e0e0e0;
            color: #333;
        }

        .btn-view:hover {
            background: #d0d0d0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Rspack Browser Demo</h1>
            <p>在浏览器中实时打包 JavaScript 代码</p>
        </div>

        <div class="content">
            <div class="button-group">
                <button id="bundleBtn" class="btn-primary">
                    🔨 打包代码
                </button>
                <button id="runBtn" class="btn-secondary" disabled>
                    ▶️ 运行打包结果
                </button>
                <button id="downloadBtn" class="btn-secondary" disabled>
                    💾 下载产物
                </button>
            </div>

            <div class="output-section">
                <h3>📊 打包结果</h3>
                <div class="stats" id="stats" style="display: none;">
                    <div class="stat-card">
                        <div class="stat-label">打包时间</div>
                        <div class="stat-value" id="buildTime">-</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">输出大小</div>
                        <div class="stat-value" id="outputSize">-</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">模块数量</div>
                        <div class="stat-value" id="moduleCount">-</div>
                    </div>
                </div>
                
                <!-- 文件列表 -->
                <div id="filesList" class="files-list" style="display: none;"></div>
                
                <div id="output" class="output-content">等待打包...</div>
                <div id="message"></div>
            </div>

            <div class="output-section" id="runOutputSection" style="display: none;">
                <h3>🖥️ 运行输出</h3>
                <div id="runOutput" class="output-content"></div>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
